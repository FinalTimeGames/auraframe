<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AuraFrame v6.0 | Immersive Learning</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&family=Syncopate:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --bg: #030303;
            --text-main: #ffffff;
            --text-muted: #888888;
            --brand: #e11d48;
            --brand-alt: #0ea5e9;
            --noise: url('data:image/svg+xml;utf8,%3Csvg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"%3E%3Cfilter id="n"%3E%3CfeTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="3" stitchTiles="stitch"/%3E%3C/filter%3E%3Crect width="100%25" height="100%25" filter="url(%23n)" opacity="0.15"/%3E%3C/svg%3E');
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        body, html { width: 100%; height: 100%; background: var(--bg); color: var(--text-main); overflow: hidden; }

        /* --- Overlays Universais --- */
        .overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; pointer-events: none; z-index: 900; }
        .noise-layer { background-image: var(--noise); mix-blend-mode: overlay; z-index: 999; opacity: 0.9;}
        .vignette-layer { background: radial-gradient(circle at center, transparent 20%, #000000 120%); z-index: 998; }

        .ft-branding { position: absolute; top: 30px; left: 30px; font-family: 'Syncopate'; font-size: 1rem; font-weight: 700; letter-spacing: 3px; z-index: 1000; text-transform: uppercase; text-shadow: 0 4px 20px rgba(0,0,0,0.8); }
        .ft-branding span { color: var(--brand); }

        /* --- Telas --- */
        .screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; transition: opacity 0.6s ease; opacity: 0; pointer-events: none; z-index: 10; }
        .screen.active { opacity: 1; pointer-events: all; }

        /* --- 1. SEARCH SCREEN --- */
        #search-screen { background: radial-gradient(circle at top, #141414, var(--bg)); }
        .hero-title { font-family: 'Syncopate'; font-size: clamp(2rem, 5vw, 4rem); font-weight: 900; letter-spacing: -2px; margin-bottom: 5px; text-shadow: 0 10px 30px rgba(0,0,0,0.5);}
        .hero-sub { color: var(--text-muted); text-transform: uppercase; letter-spacing: 5px; font-size: 0.8rem; margin-bottom: 50px; }
        
        .search-container { width: 90%; max-width: 550px; position: relative; }
        .search-input { width: 100%; padding: 22px 30px; font-size: 1.2rem; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.03); color: #fff; outline: none; backdrop-filter: blur(10px); transition: 0.3s; text-align: center; font-weight: 300;}
        .search-input:focus { border-color: rgba(255,255,255,0.4); background: rgba(255,255,255,0.08); box-shadow: 0 10px 40px rgba(0,0,0,0.5); }
        
        .results-box { width: 100%; max-height: 400px; overflow-y: auto; margin-top: 20px; display: flex; flex-direction: column; gap: 10px; padding-right: 5px;}
        .results-box::-webkit-scrollbar { width: 5px; }
        .results-box::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 5px; }
        
        .result-item { display: flex; align-items: center; gap: 18px; padding: 15px; background: rgba(255,255,255,0.02); border-radius: 16px; cursor: pointer; transition: 0.2s; border: 1px solid transparent; }
        .result-item:hover { background: rgba(255,255,255,0.05); border-color: rgba(255,255,255,0.1); transform: translateY(-2px); }
        .result-img { width: 55px; height: 55px; border-radius: 12px; object-fit: cover; box-shadow: 0 5px 15px rgba(0,0,0,0.5);}
        .result-title { font-weight: 800; font-size: 1.1rem; }
        .result-artist { font-size: 0.85rem; color: var(--text-muted); }

        /* --- 2. SHOW SCREEN --- */
        #show-screen { background: #000; perspective: 1000px; overflow: hidden;}
        
        .cinematic-bg-container { position: absolute; top: -15%; left: -15%; width: 130%; height: 130%; z-index: 1; overflow: hidden; background: #000;}
        .cinematic-bg { width: 100%; height: 100%; background-size: cover; background-position: center; filter: blur(35px) brightness(0.4) saturate(1.2); transition: transform 0.1s ease-out, filter 0.2s; position: absolute; top:0; left:0;}
        #cinematic-video { width: 100%; height: 100%; object-fit: cover; filter: blur(10px) brightness(0.4) saturate(1.2); opacity: 0; transition: opacity 1s; position: absolute; top:0; left:0;}
        
        #swipe-container { position: absolute; width: 100%; height: 100%; z-index: 5; transform-style: preserve-3d; display: flex; justify-content: center; align-items: center; flex-direction: column; transition: all 0.5s cubic-bezier(0.25, 1, 0.5, 1);}
        
        .artwork-container {
            width: clamp(250px, 35vw, 350px); aspect-ratio: 1; position: relative;
            transform-style: preserve-3d; transition: all 0.6s cubic-bezier(0.25, 1, 0.5, 1); 
            margin-bottom: 20vh;
        }
        
        .glass-cover {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            border-radius: 20px; background-size: cover; background-position: center;
            box-shadow: 0 40px 80px rgba(0,0,0,0.9), inset 0 0 0 1px rgba(255,255,255,0.2), inset 0 20px 40px rgba(255,255,255,0.1);
            transform: translateZ(30px);
        }
        .cover-shadow {
            position: absolute; top: 10%; left: 5%; width: 90%; height: 90%;
            background: #000; filter: blur(30px); opacity: 0.8; transform: translateZ(-20px);
        }

        /* --- LEARNING MODE CLASSES --- */
        #show-screen.learning-active #swipe-container { justify-content: flex-start; padding-top: 10vh; }
        #show-screen.learning-active .artwork-container { width: 150px; margin-bottom: 5vh; transform: scale(0.8) translateZ(10px) !important; opacity: 0.5;}
        #show-screen.learning-active .lyrics-stage { height: 65%; bottom: 5%; align-items: flex-start; text-align: left; padding: 0 10%;}
        #show-screen.learning-active .lyric-line { font-size: clamp(1.5rem, 4vw, 3rem); justify-content: flex-start; text-align: left;}

        /* Letras e Traduções */
        .lyrics-stage {
            position: absolute; bottom: 8%; left: 0; width: 100%; height: 35%;
            display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center;
            transform: translateZ(50px); transition: all 0.6s ease;
        }
        .lyric-line {
            font-size: clamp(2rem, 6vw, 4.5rem); font-weight: 900; line-height: 1.1; text-transform: uppercase;
            letter-spacing: -2px; position: absolute; display: flex; flex-direction: column; align-items: center;
            text-shadow: 0 15px 40px rgba(0,0,0,1), 0 2px 5px rgba(0,0,0,0.5); pointer-events: none; width: 100%;
        }
        .lyric-original { display: flex; flex-wrap: wrap; justify-content: inherit; gap: 0.25em; }
        .lyric-word { display: inline-block; opacity: 0; filter: blur(15px); transform: translateY(40px) scale(0.8) rotateX(-30deg); transform-origin: bottom center; }
        
        .lyric-translation {
            font-size: clamp(1rem, 2vw, 1.5rem); color: var(--brand-alt); font-weight: 700; letter-spacing: 0px; 
            margin-top: 15px; opacity: 0; filter: blur(10px); transform: translateY(20px); text-transform: none;
            font-family: 'Inter', sans-serif; display: none; text-shadow: 0 5px 15px rgba(0,0,0,0.8);
        }
        #show-screen.learning-active .lyric-translation { display: block; }

        .fallback-ring {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 100%; height: 100%; border: 2px solid rgba(255,255,255,0.1); border-radius: 50%;
            z-index: 1; pointer-events: none; display: none;
        }

        /* Sidebar & Controles */
        .tiktok-sidebar { position: absolute; right: 20px; bottom: 15%; display: flex; flex-direction: column; gap: 20px; z-index: 100; align-items: center; }
        .action-btn { width: 50px; height: 50px; border-radius: 50%; background: rgba(255,255,255,0.05); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); display: flex; justify-content: center; align-items: center; color: #fff; font-size: 1.2rem; cursor: pointer; transition: 0.3s; box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        .action-btn:hover { transform: scale(1.1); background: rgba(255,255,255,0.15); border-color: rgba(255,255,255,0.5);}
        .action-btn.active-state { color: var(--brand-alt); border-color: var(--brand-alt); background: rgba(14, 165, 233, 0.15);}
        .action-btn.share { background: #fff; color: #000; }
        .action-btn.share:hover { background: #ddd; }

        .lang-selector { position: absolute; top: 30px; right: 30px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.2); color: #fff; padding: 8px 15px; border-radius: 20px; outline: none; backdrop-filter: blur(10px); font-weight: 700; z-index: 100; cursor: pointer; display: none;}
        #show-screen.learning-active .lang-selector { display: block; animation: fadeIn 0.5s ease;}

        .progress-bar { position: absolute; bottom: 0; left: 0; width: 100%; height: 5px; background: rgba(255,255,255,0.1); z-index: 100; }
        .progress-fill { height: 100%; width: 0%; background: var(--brand); box-shadow: 0 0 15px var(--brand); transition: width 0.1s linear;}
        
        .swipe-hint { position: absolute; top: 40px; left: 50%; transform: translateX(-50%); color: rgba(255,255,255,0.4); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 3px; display: flex; flex-direction: column; align-items: center; gap: 5px; animation: float 2s infinite ease-in-out; z-index: 100; pointer-events: none;}
        @keyframes float { 0%,100%{transform: translate(-50%, 0);} 50%{transform: translate(-50%, -8px);} }
        @keyframes fadeIn { from {opacity: 0;} to {opacity: 1;} }

        /* --- 3. EXPORT CARD --- */
        #card-screen { background: #020202; z-index: 200;}
        .card-wrapper { perspective: 1000px; }
        .final-card {
            width: 400px; height: 680px; background: #0a0a0a; border-radius: 24px; padding: 35px;
            position: relative; overflow: hidden; box-shadow: 0 40px 80px rgba(0,0,0,1), 0 0 0 1px rgba(255,255,255,0.1);
            display: flex; flex-direction: column; justify-content: flex-end; transform-style: preserve-3d;
        }
        .card-glare { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(125deg, rgba(255,255,255,0.3) 0%, rgba(255,255,255,0) 40%, rgba(255,255,255,0) 60%, rgba(255,255,255,0.05) 100%); z-index: 10; pointer-events: none;}
        .card-bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-size: cover; background-position: center; filter: blur(50px) brightness(0.3); z-index: 0; }
        .card-cover { position: absolute; top: 35px; left: 50%; transform: translateX(-50%); width: 80%; aspect-ratio: 1; background-size: cover; border-radius: 12px; box-shadow: 0 25px 50px rgba(0,0,0,0.9); z-index: 2;}
        
        .card-info { z-index: 2; margin-bottom: 25px; position: relative;}
        .card-song { font-size: 2.2rem; font-weight: 900; letter-spacing: -1.5px; line-height: 1.1; color: #fff; text-shadow: 0 5px 15px rgba(0,0,0,0.5);}
        .card-artist { font-size: 1.1rem; color: #aaa; margin-top: 5px; font-weight: 300;}
        
        .card-stats { display: flex; justify-content: space-between; border-top: 1px solid rgba(255,255,255,0.15); padding-top: 20px; z-index: 2; position: relative;}
        .stat-box { display: flex; flex-direction: column; }
        .stat-label { font-size: 0.65rem; color: #888; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 4px;}
        .stat-val { font-size: 1.3rem; font-weight: 900; color: #fff; letter-spacing: -0.5px;}
        
        .card-barcode { position: absolute; top: 35px; right: 35px; height: 80px; width: 25px; background: repeating-linear-gradient(to bottom, #fff, #fff 2px, transparent 2px, transparent 5px, #fff 5px, #fff 6px, transparent 6px, transparent 10px); z-index: 2; opacity: 0.5;}
        .card-brand { position: absolute; bottom: 35px; right: 35px; font-family: 'Syncopate'; font-size: 0.5rem; color: rgba(255,255,255,0.4); z-index: 2; letter-spacing: 3px; writing-mode: vertical-rl; transform: rotate(180deg);}

        .btn-download { margin-top: 40px; padding: 20px 50px; border-radius: 12px; background: #fff; color: #000; font-weight: 900; font-size: 1.1rem; cursor: pointer; border: none; z-index: 100; text-transform: uppercase; letter-spacing: 1px; transition: 0.3s; box-shadow: 0 10px 30px rgba(255,255,255,0.2);}
        .btn-download:hover { transform: translateY(-3px); box-shadow: 0 15px 40px rgba(255,255,255,0.4); }
        .btn-close { position: absolute; top: 30px; right: 30px; color: #fff; font-size: 2rem; cursor: pointer; z-index: 200; background: none; border: none; opacity: 0.5; transition: 0.2s;}
        .btn-close:hover { opacity: 1; transform: scale(1.1);}

        .loader { font-family: 'Syncopate'; font-size: 1.2rem; letter-spacing: 4px; animation: pulse 1s infinite alternate; }
        @keyframes pulse { to { opacity: 0.2; transform: scale(0.95);} }
    </style>
</head>
<body>

    <div class="overlay vignette-layer"></div>
    <div class="overlay noise-layer"></div>

    <div class="ft-branding">Finaltime<span>.</span></div>
    <audio id="audio-player" crossorigin="anonymous"></audio>

    <div id="search-screen" class="screen active">
        <h1 class="hero-title">AURALEARN</h1>
        <p class="hero-sub">V6.0 Immersion Engine</p>
        <div class="search-container">
            <input type="text" id="search-input" class="search-input" placeholder="What's your vibe today? (e.g. Arctic Monkeys)" autocomplete="off">
            <div id="results" class="results-box"></div>
        </div>
    </div>

    <div id="loading-screen" class="screen">
        <div class="loader">SYNCING AURA...</div>
    </div>

    <div id="show-screen" class="screen">
        <select id="target-lang" class="lang-selector" onchange="changeLanguage()">
            <option value="pt">Português</option>
            <option value="fr">Français</option>
            <option value="en">English</option>
        </select>
        
        <div class="cinematic-bg-container">
            <div id="cinematic-bg" class="cinematic-bg"></div>
            <video id="cinematic-video" autoplay loop muted playsinline></video>
        </div>

        <div id="swipe-container">
            <div class="swipe-hint"><i class="fa-solid fa-chevron-up"></i> Swipe</div>

            <div class="artwork-container" id="artwork-3d">
                <div class="cover-shadow"></div>
                <div id="glass-cover" class="glass-cover"></div>
                <div id="fallback-ring" class="fallback-ring"></div>
            </div>

            <div id="lyrics-container" class="lyrics-stage"></div>
        </div>

        <div class="tiktok-sidebar">
            <div class="action-btn" onclick="returnToSearch()" title="Search Again">
                <i class="fa-solid fa-magnifying-glass"></i>
            </div>
            <div class="action-btn" id="learn-btn" onclick="toggleLearningMode()" title="Immersive Learning">
                <i class="fa-solid fa-book-open"></i>
            </div>
            <div class="action-btn" id="like-btn" onclick="toggleLike()">
                <i class="fa-solid fa-heart"></i>
            </div>
            <div class="action-btn share" onclick="openCard()" title="Export Aura">
                <i class="fa-solid fa-share-nodes"></i>
            </div>
        </div>

        <div class="progress-bar"><div id="progress-fill" class="progress-fill"></div></div>
    </div>

    <div id="card-screen" class="screen">
        <button class="btn-close" onclick="closeCard()"><i class="fa-solid fa-xmark"></i></button>
        <div class="card-wrapper">
            <div id="export-card" class="final-card">
                <div class="card-glare"></div>
                <div id="card-bg" class="card-bg"></div>
                <div class="overlay noise-layer" style="opacity: 0.4; z-index: 1;"></div>
                
                <div class="card-barcode"></div>
                <div id="card-img" class="card-cover"></div>
                
                <div class="card-info">
                    <div id="card-song" class="card-song">Track Name</div>
                    <div id="card-artist" class="card-artist">Artist</div>
                </div>
                
                <div class="card-stats">
                    <div class="stat-box"><span class="stat-label">Aura Lvl</span><span id="stat-vibe" class="stat-val">MAX</span></div>
                    <div class="stat-box"><span class="stat-label">Immersion</span><span id="stat-lang" class="stat-val">PT</span></div>
                </div>
                
                <div class="card-brand">FINALTIME</div>
            </div>
        </div>
        <button class="btn-download" onclick="downloadCard()">Export Ticket</button>
    </div>

    <script>
        // CONFIGURAÇÕES DA API
        const PEXELS_KEY = ''; // Insira sua chave Pexels aqui para vídeos dinâmicos

        const UI = {
            screens: { search: document.getElementById('search-screen'), loading: document.getElementById('loading-screen'), show: document.getElementById('show-screen'), card: document.getElementById('card-screen') },
            input: document.getElementById('search-input'), results: document.getElementById('results'), audio: document.getElementById('audio-player'),
            cineBg: document.getElementById('cinematic-bg'), cineVideo: document.getElementById('cinematic-video'),
            artwork3D: document.getElementById('artwork-3d'), glassCover: document.getElementById('glass-cover'),
            lyrics: document.getElementById('lyrics-container'), progress: document.getElementById('progress-fill'),
            swipeCont: document.getElementById('swipe-container'), fallbackRing: document.getElementById('fallback-ring'),
            targetLang: document.getElementById('target-lang')
        };

        let STATE = {
            playlist: [], currentIndex: 0, lyricsData: [], activeLine: -1,
            audioCtx: null, analyser: null, dataArray: null, animFrame: null, bgAnim: null,
            lastBeatTime: 0, startY: 0, learningMode: false
        };

        /* --- MOTOR DE VIBE (Geração Semântica) --- */
        function generateVibe(title, artist) {
            const text = `${title} ${artist}`.toLowerCase();
            if (text.match(/night|dark|shadow|black|moon|midnight/)) return "dark city neon cyberpunk";
            if (text.match(/love|heart|kiss|sweet|romance/)) return "romantic sunset cinematic";
            if (text.match(/rain|cry|sad|tears|sorrow/)) return "rainy window moody";
            if (text.match(/fire|burn|hot|summer|sun/)) return "summer beach aesthetic";
            if (text.match(/rock|metal|grunge|guitar/)) return "concert dark grunge aesthetic"; 
            return "abstract cinematic dark lighting";
        }

        async function fetchBackgroundMedia(vibe) {
            if (!PEXELS_KEY) return null;
            try {
                const res = await fetch(`https://api.pexels.com/videos/search?query=${encodeURIComponent(vibe)}&per_page=3`, {
                    headers: { Authorization: PEXELS_KEY }
                });
                const data = await res.json();
                if (data.video_files && data.video_files.length > 0) {
                    const hd = data.video_files.find(v => v.quality === 'hd') || data.video_files[0];
                    return hd.link;
                }
            } catch (e) { console.error("Pexels fetch failed:", e); }
            return null;
        }

        /* --- MOTOR DE TRADUÇÃO (Google API Free Endpoint) --- */
        async function translateLine(text, targetLang) {
            if(!text || text.trim() === '') return '';
            try {
                const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=auto&tl=${targetLang}&dt=t&q=${encodeURIComponent(text)}`;
                const res = await fetch(url);
                const data = await res.json();
                return data[0][0][0]; // Extrai o texto principal
            } catch(e) {
                return "Translation unavailable";
            }
        }

        /* --- BUSCA E PLAYLIST --- */
        let searchTimeout;
        UI.input.addEventListener('input', (e) => {
            clearTimeout(searchTimeout);
            const query = e.target.value.trim();
            if (query.length < 3) { UI.results.innerHTML = ''; return; }
            
            searchTimeout = setTimeout(async () => {
                try {
                    const res = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(query)}&entity=song&limit=6`);
                    const data = await res.json();
                    renderResults(data.results);
                } catch(e) {}
            }, 400);
        });

        function renderResults(tracks) {
            UI.results.innerHTML = '';
            tracks.forEach(track => {
                const imgHQ = track.artworkUrl100.replace('100x100bb', '800x800bb');
                const div = document.createElement('div');
                div.className = 'result-item';
                div.innerHTML = `<img src="${track.artworkUrl100}" class="result-img"><div style="display:flex; flex-direction:column;"><span class="result-title">${track.trackName}</span><span class="result-artist">${track.artistName}</span></div>`;
                div.onclick = () => buildPlaylistQueue(track.artistName, track.trackName, track.previewUrl, imgHQ);
                UI.results.appendChild(div);
            });
        }

        async function buildPlaylistQueue(artist, firstTitle, firstAudio, firstImg) {
            switchScreen('loading');
            STATE.playlist = [{ title: firstTitle, artist: artist, audio: firstAudio, cover: firstImg }];
            STATE.currentIndex = 0;

            try {
                const res = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(artist)}&entity=song&limit=6`);
                const data = await res.json();
                data.results.forEach(t => {
                    if(t.trackName !== firstTitle) STATE.playlist.push({ title: t.trackName, artist: t.artistName, audio: t.previewUrl, cover: t.artworkUrl100.replace('100x100bb', '800x800bb') });
                });
            } catch(e) {}
            loadTrack(STATE.currentIndex);
        }

        function returnToSearch() {
            UI.audio.pause();
            cancelAnimationFrame(STATE.animFrame);
            if(STATE.bgAnim) STATE.bgAnim.kill();
            UI.cineVideo.style.opacity = '0';
            UI.input.value = '';
            UI.results.innerHTML = '';
            switchScreen('search');
        }

        const cleanForLyrics = (str) => str.split(' - ')[0].split(' (')[0].split(' feat')[0].split(' ft')[0].trim();

        async function loadTrack(index) {
            const track = STATE.playlist[index];
            if(!track) return;

            const cleanTitle = cleanForLyrics(track.title);
            const cleanArtist = cleanForLyrics(track.artist);
            
            // UI Resets
            UI.cineBg.style.backgroundImage = `url(${track.cover})`;
            UI.glassCover.style.backgroundImage = `url(${track.cover})`;
            document.getElementById('card-img').style.backgroundImage = `url(${track.cover})`;
            document.getElementById('card-bg').style.backgroundImage = `url(${track.cover})`;
            document.getElementById('card-song').innerText = cleanTitle;
            document.getElementById('card-artist').innerText = track.artist;
            document.getElementById('like-btn').querySelector('i').style.color = '#fff';
            UI.fallbackRing.style.display = 'none';
            UI.cineVideo.style.opacity = '0';

            // Background Video Vibe
            const vibe = generateVibe(cleanTitle, cleanArtist);
            const videoUrl = await fetchBackgroundMedia(vibe);
            if(videoUrl) {
                UI.cineVideo.src = videoUrl;
                UI.cineVideo.oncanplay = () => { UI.cineVideo.style.opacity = '1'; };
            }

            // Letras
            STATE.lyricsData = [];
            STATE.activeLine = -1;
            try {
                const res = await fetch(`https://lrclib.net/api/search?track_name=${encodeURIComponent(cleanTitle)}&artist_name=${encodeURIComponent(cleanArtist)}`);
                const data = await res.json();
                const match = data.find(t => t.syncedLyrics);
                if(match) STATE.lyricsData = parseLRC(match.syncedLyrics);
            } catch(e) {}

            UI.audio.src = track.audio;
            UI.audio.load();
            UI.audio.volume = 0;
            setupAudioContext();

            // Ken Burns Fallback
            if(STATE.bgAnim) STATE.bgAnim.kill();
            gsap.set(UI.cineBg, {scale: 1, x: 0, y: 0});
            STATE.bgAnim = gsap.to(UI.cineBg, {
                x: () => Math.random() * 20 - 10 + 'vw', y: () => Math.random() * 20 - 10 + 'vh', 
                scale: 1.15, duration: 15, ease: "sine.inOut", yoyo: true, repeat: -1
            });

            setTimeout(() => {
                switchScreen('show');
                UI.audio.play().then(() => {
                    gsap.to(UI.audio, {volume: 1, duration: 1});
                    startEngine(cleanTitle);
                }).catch(e => { alert("Interaja com a tela para tocar o áudio."); });
            }, 800);
        }

        function parseLRC(lrc) {
            const parsed = [];
            const timeReg = /\[(\d{2}):(\d{2}\.\d{2,3})\]/;
            lrc.split('\n').forEach(line => {
                const match = timeReg.exec(line);
                if(match) {
                    const text = line.replace(timeReg, '').trim();
                    if(text) parsed.push({ time: (parseInt(match[1]) * 60) + parseFloat(match[2]), text, translation: null });
                }
            });
            return parsed;
        }

        /* --- SWIPE E 3D --- */
        window.addEventListener('mousedown', e => STATE.startY = e.clientY);
        window.addEventListener('touchstart', e => STATE.startY = e.touches[0].clientY);
        window.addEventListener('mouseup', e => handleSwipe(e.clientY));
        window.addEventListener('touchend', e => handleSwipe(e.changedTouches[0].clientY));

        function handleSwipe(endY) {
            if(!UI.screens.show.classList.contains('active')) return;
            const diff = STATE.startY - endY;
            if(diff > 60 && STATE.currentIndex < STATE.playlist.length - 1) changeTrackAnimation(1, -100); 
            else if (diff < -60 && STATE.currentIndex > 0) changeTrackAnimation(-1, 100); 
        }

        function changeTrackAnimation(dir, yOffset) {
            cancelAnimationFrame(STATE.animFrame);
            gsap.to(UI.audio, {volume: 0, duration: 0.3});
            gsap.to(UI.swipeCont, { y: `${yOffset}vh`, opacity: 0, duration: 0.4, ease: "power2.in", onComplete: () => {
                STATE.currentIndex += dir;
                gsap.set(UI.swipeCont, {y: `${-yOffset}vh`});
                loadTrack(STATE.currentIndex);
                gsap.to(UI.swipeCont, {y: '0vh', opacity: 1, duration: 0.5, ease: "power2.out", delay: 0.2});
            }});
        }

        document.addEventListener('mousemove', (e) => {
            if(!UI.screens.show.classList.contains('active') || STATE.learningMode) return;
            const xAxis = (window.innerWidth / 2 - e.pageX) / 25;
            const yAxis = (window.innerHeight / 2 - e.pageY) / 25;
            UI.artwork3D.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
        });

        /* --- ENGINE E RENDERIZAÇÃO --- */
        function setupAudioContext() {
            if(!STATE.audioCtx) {
                STATE.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                STATE.analyser = STATE.audioCtx.createAnalyser();
                const source = STATE.audioCtx.createMediaElementSource(UI.audio);
                source.connect(STATE.analyser);
                STATE.analyser.connect(STATE.audioCtx.destination);
                STATE.analyser.fftSize = 256;
                STATE.dataArray = new Uint8Array(STATE.analyser.frequencyBinCount);
            }
            if(STATE.audioCtx.state === 'suspended') STATE.audioCtx.resume();
        }

        async function processTranslations(currentIndex) {
            const lang = UI.targetLang.value;
            // Traduz a linha atual se ainda não estiver traduzida
            if(STATE.lyricsData[currentIndex] && !STATE.lyricsData[currentIndex].translation) {
                STATE.lyricsData[currentIndex].translation = await translateLine(STATE.lyricsData[currentIndex].text, lang);
                const transEl = document.getElementById(`trans-${currentIndex}`);
                if(transEl) transEl.innerText = STATE.lyricsData[currentIndex].translation;
            }
            // Pré-busca a próxima linha
            if(STATE.lyricsData[currentIndex+1] && !STATE.lyricsData[currentIndex+1].translation) {
                STATE.lyricsData[currentIndex+1].translation = await translateLine(STATE.lyricsData[currentIndex+1].text, lang);
            }
        }

        function changeLanguage() {
            // Reseta traduções cacheadas ao trocar o idioma
            STATE.lyricsData.forEach(l => l.translation = null);
            if(STATE.activeLine >= 0) processTranslations(STATE.activeLine);
        }

        function startEngine(fallbackTitle) {
            UI.lyrics.innerHTML = '';
            
            if(STATE.lyricsData.length > 0) {
                STATE.lyricsData.forEach((line, i) => {
                    const div = document.createElement('div');
                    div.className = 'lyric-line'; div.id = `line-${i}`; div.style.display = 'none';
                    
                    const origDiv = document.createElement('div');
                    origDiv.className = 'lyric-original';
                    line.text.split(' ').forEach(w => {
                        const span = document.createElement('span'); span.className = 'lyric-word'; span.innerText = w;
                        origDiv.appendChild(span);
                    });
                    
                    const transDiv = document.createElement('div');
                    transDiv.className = 'lyric-translation'; transDiv.id = `trans-${i}`;
                    transDiv.innerText = "...";

                    div.appendChild(origDiv);
                    div.appendChild(transDiv);
                    UI.lyrics.appendChild(div);
                });
            } else {
                UI.lyrics.innerHTML = `<div class="lyric-line" id="fallback-txt" style="display:flex; opacity:1;"><span class="lyric-word" style="opacity:1; filter:blur(0); transform:none;">${fallbackTitle}</span></div>`;
                UI.fallbackRing.style.display = 'block';
            }

            function render() {
                if(UI.audio.paused && UI.audio.currentTime === 0) return;

                const currT = UI.audio.currentTime;
                UI.progress.style.width = `${(currT / UI.audio.duration) * 100}%`;

                STATE.analyser.getByteFrequencyData(STATE.dataArray);
                const bass = STATE.dataArray.slice(0, 4).reduce((a, b) => a + b) / 4; 
                
                // Beat Animation
                if(bass > 230 && (currT - STATE.lastBeatTime > 0.35)) {
                    gsap.fromTo(UI.cineBg, {filter: 'blur(10px) brightness(0.8) saturate(1.5)'}, {filter: 'blur(35px) brightness(0.4) saturate(1.2)', duration: 0.5});
                    if(!STATE.learningMode) gsap.fromTo(UI.artwork3D, {scale: 1.08}, {scale: 1, duration: 0.3, ease:"power2.out"});
                    
                    if(STATE.lyricsData.length === 0) {
                        gsap.fromTo(UI.fallbackRing, {scale: 1, opacity: 1}, {scale: 1.5, opacity: 0, duration: 0.6});
                        gsap.fromTo(document.getElementById('fallback-txt'), {scale: 1.1, color: 'var(--brand)'}, {scale: 1, color: '#fff', duration: 0.3});
                    }
                    STATE.lastBeatTime = currT;
                }

                // Lyric Flow
                if(STATE.lyricsData.length > 0) {
                    let newIdx = STATE.lyricsData.findIndex(l => l.time > currT) - 1;
                    if(newIdx === -2) newIdx = STATE.lyricsData.length - 1; 
                    
                    if(newIdx !== STATE.activeLine && newIdx >= 0) {
                        // Translation Process (Lazy Load)
                        if(STATE.learningMode) processTranslations(newIdx);

                        if(STATE.activeLine >= 0) {
                            const oldEl = document.getElementById(`line-${STATE.activeLine}`);
                            if(oldEl) {
                                gsap.to(oldEl.querySelectorAll('.lyric-word'), { y: -40, opacity: 0, filter: "blur(15px)", stagger: 0.02, duration: 0.4 });
                                gsap.to(oldEl.querySelector('.lyric-translation'), { y: -20, opacity: 0, duration: 0.4, onComplete: () => oldEl.style.display = 'none' });
                            }
                        }
                        
                        const newEl = document.getElementById(`line-${newIdx}`);
                        if(newEl) {
                            newEl.style.display = 'flex';
                            gsap.fromTo(newEl.querySelectorAll('.lyric-word'), 
                                { y: 40, opacity: 0, filter: "blur(15px)", scale: 0.8, rotationX: -45 }, 
                                { y: 0, opacity: 1, filter: "blur(0px)", scale: 1, rotationX: 0, stagger: 0.04, duration: 0.7, ease: "back.out(1.4)" }
                            );
                            gsap.fromTo(newEl.querySelector('.lyric-translation'),
                                { y: 20, opacity: 0, filter: "blur(10px)" },
                                { y: 0, opacity: 1, filter: "blur(0px)", duration: 0.8, delay: 0.3 }
                            );
                        }
                        STATE.activeLine = newIdx;
                    }
                }
                STATE.animFrame = requestAnimationFrame(render);
            }
            render();
        }

        /* --- UI CONTROLS --- */
        function switchScreen(id) {
            Object.values(UI.screens).forEach(s => s.classList.remove('active'));
            UI.screens[id].classList.add('active');
        }

        function toggleLearningMode() {
            STATE.learningMode = !STATE.learningMode;
            const btn = document.getElementById('learn-btn');
            if(STATE.learningMode) {
                UI.screens.show.classList.add('learning-active');
                btn.classList.add('active-state');
                UI.artwork3D.style.transform = `scale(0.8) translateZ(10px)`; // Reset tilt
                if(STATE.activeLine >= 0) processTranslations(STATE.activeLine);
            } else {
                UI.screens.show.classList.remove('learning-active');
                btn.classList.remove('active-state');
            }
        }

        function toggleLike() {
            const icon = document.getElementById('like-btn').querySelector('i');
            icon.style.color = icon.style.color === 'rgb(225, 29, 72)' ? '#fff' : 'var(--brand)';
            gsap.fromTo(icon, {scale: 0.5}, {scale: 1, duration: 0.4, ease:"elastic.out(1, 0.3)"});
        }

        function openCard() {
            gsap.to(UI.audio, {volume: 0.2, duration: 0.5});
            document.getElementById('stat-lang').innerText = UI.targetLang.value.toUpperCase();
            switchScreen('card');
            gsap.fromTo('.final-card', {y: 100, rotationX: 20, opacity: 0}, {y: 0, rotationX: 0, opacity: 1, duration: 0.6, ease: "power3.out"});
        }

        function closeCard() {
            gsap.to(UI.audio, {volume: 1, duration: 0.5});
            switchScreen('show');
        }

        function downloadCard() {
            const card = document.getElementById('export-card');
            const btn = document.querySelector('.btn-download');
            btn.innerText = "PROCESSING...";
            
            html2canvas(card, { useCORS: true, scale: 3, backgroundColor: '#020202' }).then(canvas => {
                const link = document.createElement('a');
                link.download = 'AuraLearn_Ticket.jpg';
                link.href = canvas.toDataURL('image/jpeg', 0.95);
                link.click();
                btn.innerText = "EXPORT TICKET";
            }).catch(err => {
                alert("Habilite o CORS no navegador para exportar imagens externas.");
                btn.innerText = "EXPORT TICKET";
            });
        }
    </script>
</body>
